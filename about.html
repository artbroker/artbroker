<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Over ons - Artbroker International</title>
  <link rel="icon" href="https://Artbroker.b-cdn.net/Logo%20e.d./favicon.ico" />

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/about.css" />
  <link rel="stylesheet" href="./css/footer.css" />
</head>

<body>
  <div data-partial="./partials/header.html"></div>

  <main class="about-page">
    <section class="container about-shell">
      <div class="about-intro">
        <div class="eyebrow">Over ons</div>
        <h1>Berichten uit de media</h1>
        <p>
          Artbroker International staat regelmatig in de belangstelling van de Nederlandse media.
          Hier een kleine selectie van persberichten over onze activiteiten door de jaren heen:
        </p>
      </div>

      <div class="media-carousel-wrap carousel-wrap">
        <button class="media-carousel-btn prev" data-carousel="media" data-dir="-1" type="button" aria-label="Vorige media artikel">‹</button>

        <div class="media-carousel" id="media-carousel" data-drag-scroll="true" aria-label="Berichten uit de media carousel">
            <a class="media-card" href="https://Artbroker.b-cdn.net/krantenartikelen/ar50.jpg" target="_blank" rel="noopener">
              <img src="https://Artbroker.b-cdn.net/krantenartikelen/ar50.jpg" alt="Persbericht Artbroker International" draggable="false" />
            </a>
            <a class="media-card" href="https://Artbroker.b-cdn.net/krantenartikelen/pers-lemmer-com.jpg" target="_blank" rel="noopener">
              <img src="https://Artbroker.b-cdn.net/krantenartikelen/pers-lemmer-com.jpg" alt="Persartikel Lemmer" draggable="false" />
            </a>
            <a class="media-card" href="https://Artbroker.b-cdn.net/krantenartikelen/pers-lovesick-com.jpg" target="_blank" rel="noopener">
              <img src="https://Artbroker.b-cdn.net/krantenartikelen/pers-lovesick-com.jpg" alt="Persartikel Lovesick" draggable="false" />
            </a>
            <a class="media-card" href="https://Artbroker.b-cdn.net/krantenartikelen/pers-nieuwe-revue-com.jpg" target="_blank" rel="noopener">
              <img src="https://Artbroker.b-cdn.net/krantenartikelen/pers-nieuwe-revue-com.jpg" alt="Persartikel Nieuwe Revue" draggable="false" />
            </a>
            <a class="media-card" href="https://Artbroker.b-cdn.net/krantenartikelen/pers-treble-br_dgbl-com.jpg" target="_blank" rel="noopener">
              <img src="https://Artbroker.b-cdn.net/krantenartikelen/pers-treble-br_dgbl-com.jpg" alt="Persartikel Treble" draggable="false" />
            </a>
            <a class="media-card" href="https://Artbroker.b-cdn.net/krantenartikelen/scannen0002.jpg" target="_blank" rel="noopener">
              <img src="https://Artbroker.b-cdn.net/krantenartikelen/scannen0002.jpg" alt="Krantenartikel scan 0002" draggable="false" />
            </a>
            <a class="media-card" href="https://Artbroker.b-cdn.net/krantenartikelen/scannen0003.jpg" target="_blank" rel="noopener">
              <img src="https://Artbroker.b-cdn.net/krantenartikelen/scannen0003.jpg" alt="Krantenartikel scan 0003" draggable="false" />
            </a>
        </div>

        <button class="media-carousel-btn next" data-carousel="media" data-dir="1" type="button" aria-label="Volgende media artikel">›</button>
      </div>
    </section>
  </main>

  <div data-partial="./partials/footer.html"></div>

  <script src="./js/partials.js" defer></script>
  <script src="./js/carousel.js" defer></script>
</body>
</html>
