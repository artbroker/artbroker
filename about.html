<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Over ons - Artbroker International</title>
  <link rel="icon" href="https://Artbroker.b-cdn.net/Logo%20e.d./favicon.ico" />

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/about.css" />
  <link rel="stylesheet" href="./css/footer.css" />
</head>

<body>
  <div data-partial="./partials/header.html"></div>

  <main class="about-page">
    <section class="container about-shell">
      <div class="about-intro">
        <div class="eyebrow">Over ons</div>
        <h1>Onze geschiedenis in foto's en krantenartikelen</h1>
      </div>

      <div class="media-carousel-wrap carousel-wrap">
        <button class="media-carousel-btn prev" data-carousel="media" data-dir="-1" type="button" aria-label="Vorige media artikel">‹</button>

        <div class="media-carousel" id="media-carousel" data-drag-scroll="true" aria-label="Berichten uit de media carousel">
          <button class="media-card" data-lightbox-image data-lightbox-src="https://Artbroker.b-cdn.net/krantenartikelen/ar50.jpg" type="button" aria-label="Vergroot Persbericht Artbroker International">
            <img src="https://Artbroker.b-cdn.net/krantenartikelen/ar50.jpg" alt="Persbericht Artbroker International" draggable="false" />
          </button>
          <button class="media-card" data-lightbox-image data-lightbox-src="https://Artbroker.b-cdn.net/krantenartikelen/pers-lemmer-com.jpg" type="button" aria-label="Vergroot Persartikel Lemmer">
            <img src="https://Artbroker.b-cdn.net/krantenartikelen/pers-lemmer-com.jpg" alt="Persartikel Lemmer" draggable="false" />
          </button>
          <button class="media-card" data-lightbox-image data-lightbox-src="https://Artbroker.b-cdn.net/krantenartikelen/pers-lovesick-com.jpg" type="button" aria-label="Vergroot Persartikel Lovesick">
            <img src="https://Artbroker.b-cdn.net/krantenartikelen/pers-lovesick-com.jpg" alt="Persartikel Lovesick" draggable="false" />
          </button>
          <button class="media-card" data-lightbox-image data-lightbox-src="https://Artbroker.b-cdn.net/krantenartikelen/pers-nieuwe-revue-com.jpg" type="button" aria-label="Vergroot Persartikel Nieuwe Revue">
            <img src="https://Artbroker.b-cdn.net/krantenartikelen/pers-nieuwe-revue-com.jpg" alt="Persartikel Nieuwe Revue" draggable="false" />
          </button>
          <button class="media-card" data-lightbox-image data-lightbox-src="https://Artbroker.b-cdn.net/krantenartikelen/pers-treble-br_dgbl-com.jpg" type="button" aria-label="Vergroot Persartikel Treble">
            <img src="https://Artbroker.b-cdn.net/krantenartikelen/pers-treble-br_dgbl-com.jpg" alt="Persartikel Treble" draggable="false" />
          </button>
          <button class="media-card" data-lightbox-image data-lightbox-src="https://Artbroker.b-cdn.net/krantenartikelen/scannen0002.jpg" type="button" aria-label="Vergroot Krantenartikel scan 0002">
            <img src="https://Artbroker.b-cdn.net/krantenartikelen/scannen0002.jpg" alt="Krantenartikel scan 0002" draggable="false" />
          </button>
          <button class="media-card" data-lightbox-image data-lightbox-src="https://Artbroker.b-cdn.net/krantenartikelen/scannen0003.jpg" type="button" aria-label="Vergroot Krantenartikel scan 0003">
            <img src="https://Artbroker.b-cdn.net/krantenartikelen/scannen0003.jpg" alt="Krantenartikel scan 0003" draggable="false" />
          </button>
        </div>

        <button class="media-carousel-btn next" data-carousel="media" data-dir="1" type="button" aria-label="Volgende media artikel">›</button>
      </div>
    </section>
  </main>

  <div class="media-lightbox" id="media-lightbox" aria-hidden="true" role="dialog" aria-label="Vergroot krantenartikel">
    <button class="media-lightbox-close" type="button" aria-label="Sluiten">×</button>
    <img class="media-lightbox-image" src="" alt="Vergroot krantenartikel" />
  </div>

  <div data-partial="./partials/footer.html"></div>

  <script src="./js/partials.js" defer></script>
  <script src="./js/carousel.js" defer></script>
  <script src="./js/about-lightbox.js" defer></script>
</body>
</html>
