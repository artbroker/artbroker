        <div class="eyebrow">Over ons</div>
        <h1>Onze geschiedenis in foto's en krantenartikelen</h1>

          <a class="media-card" href="#media-1" data-lightbox-image aria-label="Vergroot Persbericht Artbroker International">
            <img src="https://Artbroker.b-cdn.net/krantenartikelen/ar50.jpg" alt="Persbericht Artbroker International" draggable="false" />

          <a class="media-card" href="#media-2" data-lightbox-image aria-label="Vergroot Persartikel Lemmer">

          </a>
          <a class="media-card" href="#media-4" data-lightbox-image aria-label="Vergroot Persartikel Nieuwe Revue">
            <img src="https://Artbroker.b-cdn.net/krantenartikelen/pers-nieuwe-revue-com.jpg" alt="Persartikel Nieuwe Revue" draggable="false" />

          <a class="media-card" href="#media-5" data-lightbox-image aria-label="Vergroot Persartikel Treble">

          <a class="media-card" href="#media-6" data-lightbox-image aria-label="Vergroot Krantenartikel scan 0002">
            <img src="https://Artbroker.b-cdn.net/krantenartikelen/scannen0002.jpg" alt="Krantenartikel scan 0002" draggable="false" />
          </a>
          <a class="media-card" href="#media-7" data-lightbox-image aria-label="Vergroot Krantenartikel scan 0003">
            <img src="https://Artbroker.b-cdn.net/krantenartikelen/scannen0003.jpg" alt="Krantenartikel scan 0003" draggable="false" />
          </a>
        </div>

        <button class="media-carousel-btn next" data-carousel="media" data-dir="1" type="button" aria-label="Volgende media artikel">›</button>
      </div>
    </section>
  </main>
