<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />

  <meta name="author" content="Artbroker International" />
  <meta name="theme-color" content="#fffaf1" />
  <link rel="canonical" href="https://www.artbroker-int.nl/contact.html" />
  <meta property="og:site_name" content="Artbroker International" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Contact - Artbroker International" />
  <meta property="og:description" content="Neem contact op met Artbroker International voor vragen over kunstwerken, taxaties, bemiddeling of Herman Brood." />
  <meta property="og:url" content="https://www.artbroker-int.nl/contact.html" />
  <meta property="og:image" content="https://Artbroker.b-cdn.net/Gallery/20240322_135904.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact - Artbroker International" />
  <meta name="twitter:description" content="Neem contact op met Artbroker International voor vragen over kunstwerken, taxaties, bemiddeling of Herman Brood." />
  <meta name="twitter:image" content="https://Artbroker.b-cdn.net/Gallery/20240322_135904.jpg" />

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/contact.css" />
  <link rel="stylesheet" href="./css/footer.css" />
</head>

<body>
  <div data-partial="./partials/header.html"></div>

  <main class="contact-page" aria-label="Contactpagina van Artbroker International">
    <section class="container contact-page-shell">
      <div class="contact-intro">
        <div class="eyebrow">Contact</div>
        <h1>Neem contact op met Artbroker International</h1>
        <p>
          Heeft u een vraag over een kunstwerk, taxatie, bemiddeling of het werk van Herman Brood?
          Stuur ons een bericht. Wij nemen zo snel mogelijk contact met u op.
        </p>
      </div>

      <form class="contact-form" aria-label="Contactformulier Artbroker International" name="contact" method="POST" action="/contact.html" data-netlify="true" netlify-honeypot="bot-field" id="contact-form">
        <input type="hidden" name="form-name" value="contact" />

        <p class="hidden-field">
          <label>Laat dit veld leeg: <input name="bot-field" /></label>
        </p>

        <div class="form-grid">
          <label class="form-field">
            <span>Naam</span>
            <input type="text" name="name" autocomplete="name" required />
          </label>

          <label class="form-field">
            <span>E-mailadres</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>
        </div>

        <label class="form-field">
          <span>Onderwerp</span>
          <input type="text" name="subject" data-remove-prefix autocomplete="off" required />
        </label>

        <label class="form-field">
          <span>Bericht</span>
          <textarea name="message" rows="8" required></textarea>
        </label>

        <button class="btn btn-gold" type="submit">Verstuur bericht</button>

        <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <div data-partial="./partials/footer.html"></div>

  <script src="./js/partials.js" defer></script>
  <script src="./js/contact-form.js" defer></script>
</body>
</html>
